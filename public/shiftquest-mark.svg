<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">ShiftQuest brand mark</title>
  <desc id="desc">An original industrial speech terminal with a glowing process signal.</desc>
  <defs>
